<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>my-wiki 知識圖譜</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ── */
    #toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      z-index: 10;
    }

    #toolbar h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #a8d8ea;
      margin-right: 8px;
      white-space: nowrap;
    }

    #search {
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
      width: 180px;
      transition: border-color 0.2s;
    }
    #search:focus { border-color: #a8d8ea; }
    #search::placeholder { color: #8888aa; }

    #tag-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-btn {
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid #555;
      background: transparent;
      color: #ccc;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tag-btn:hover { border-color: #a8d8ea; color: #a8d8ea; }
    .tag-btn.active { color: #1a1a2e; border-color: transparent; font-weight: 600; }

    #hint {
      margin-left: auto;
      font-size: 0.72rem;
      color: #666;
      white-space: nowrap;
    }

    /* ── SVG canvas ── */
    #graph-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    svg:active { cursor: grabbing; }

    .link {
      stroke: #4a4a6a;
      stroke-opacity: 0.6;
      stroke-width: 1.5px;
      transition: stroke-opacity 0.2s;
    }

    .node circle {
      stroke: #1a1a2e;
      stroke-width: 1.5px;
      cursor: pointer;
      transition: r 0.2s;
    }

    .node text {
      font-size: 11px;
      fill: #ddd;
      pointer-events: none;
      text-shadow: 0 1px 3px #000, 0 0 6px #000;
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: rgba(15, 52, 96, 0.95);
      border: 1px solid #a8d8ea;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      max-width: 240px;
      z-index: 100;
      line-height: 1.6;
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .tt-title { font-weight: 700; color: #a8d8ea; margin-bottom: 4px; }
    #tooltip .tt-row { color: #ccc; }
    #tooltip .tt-row span { color: #e0e0e0; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>🗺 知識圖譜</h1>
  <input id="search" type="text" placeholder="搜尋節點…" autocomplete="off" />
  <div id="tag-filters"></div>
  <div id="hint">雙擊背景重置 · 滾輪縮放</div>
</div>

<div id="graph-container">
  <svg id="graph-svg"></svg>
</div>

<div id="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(async () => {
  // ── Load data ──────────────────────────────────────────────────────────────
  let graphData;
  try {
    const res = await fetch('data/graph.json');
    graphData = await res.json();
  } catch (e) {
    document.getElementById('graph-container').innerHTML =
      '<p style="color:#f66;padding:2rem;">⚠️ 無法載入 data/graph.json，請先執行 <code>node scripts/build-graph.mjs</code></p>';
    return;
  }

  const { nodes, links } = graphData;

  // ── Helpers ────────────────────────────────────────────────────────────────
  // count links per node
  const linkCount = new Map(nodes.map(n => [n.id, 0]));
  links.forEach(l => {
    linkCount.set(l.source, (linkCount.get(l.source) || 0) + 1);
    linkCount.set(l.target, (linkCount.get(l.target) || 0) + 1);
  });

  const radiusScale = d3.scaleLinear()
    .domain([0, d3.max([...linkCount.values()]) || 1])
    .range([8, 25])
    .clamp(true);

  const allTags = [...new Set(nodes.flatMap(n => n.tags))].sort();
  const color = d3.scaleOrdinal(d3.schemeCategory10)
    .domain([...new Set(nodes.map(n => n.group))]);

  // ── SVG setup ─────────────────────────────────────────────────────────────
  const svg = d3.select('#graph-svg');
  const container = document.getElementById('graph-container');

  function getSize() {
    return { w: container.clientWidth, h: container.clientHeight };
  }

  const g = svg.append('g').attr('class', 'zoom-group');

  const zoom = d3.zoom()
    .scaleExtent([0.1, 8])
    .on('zoom', e => g.attr('transform', e.transform));

  svg.call(zoom);

  // Double-click on background → reset
  svg.on('dblclick.zoom', null); // disable d3 default double-click zoom
  svg.on('dblclick', () => resetHighlight());

  // ── Force simulation ───────────────────────────────────────────────────────
  const { w, h } = getSize();

  const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(120))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(w / 2, h / 2))
    .force('collision', d3.forceCollide().radius(d => radiusScale(linkCount.get(d.id)) + 6));

  // ── Render links ───────────────────────────────────────────────────────────
  const linkSel = g.append('g').attr('class', 'links')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('class', 'link');

  // ── Render nodes ───────────────────────────────────────────────────────────
  const nodeSel = g.append('g').attr('class', 'nodes')
    .selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .call(drag(simulation));

  nodeSel.append('circle')
    .attr('r', d => radiusScale(linkCount.get(d.id)))
    .attr('fill', d => color(d.group));

  nodeSel.append('text')
    .attr('dy', d => radiusScale(linkCount.get(d.id)) + 12)
    .attr('text-anchor', 'middle')
    .text(d => d.title);

  simulation.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // ── Drag behaviour ─────────────────────────────────────────────────────────
  function drag(sim) {
    return d3.drag()
      .on('start', (event, d) => {
        if (!event.active) sim.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => {
        if (!event.active) sim.alphaTarget(0);
        d.fx = null; d.fy = null;
      });
  }

  // ── Tooltip ────────────────────────────────────────────────────────────────
  const tooltip = document.getElementById('tooltip');

  nodeSel
    .on('mousemove', (event, d) => {
      const count = linkCount.get(d.id) || 0;
      tooltip.innerHTML = `
        <div class="tt-title">${d.title}</div>
        <div class="tt-row">標籤：<span>${d.tags.length ? d.tags.join(', ') : '無'}</span></div>
        <div class="tt-row">連結數：<span>${count}</span></div>
        <div class="tt-row">公開：<span>${d.public ? '✅ 是' : '❌ 否'}</span></div>
      `;
      tooltip.classList.add('visible');
      const tx = Math.min(event.clientX + 14, window.innerWidth - 260);
      const ty = Math.min(event.clientY + 14, window.innerHeight - 120);
      tooltip.style.left = tx + 'px';
      tooltip.style.top  = ty + 'px';
    })
    .on('mouseleave', () => tooltip.classList.remove('visible'));

  // ── Click highlight ────────────────────────────────────────────────────────
  let activeNode = null;

  nodeSel.on('click', (event, d) => {
    event.stopPropagation();
    if (activeNode === d.id) {
      activeNode = null;
      resetHighlight();
      return;
    }
    activeNode = d.id;
    const neighbours = new Set([d.id]);
    links.forEach(l => {
      const src = typeof l.source === 'object' ? l.source.id : l.source;
      const tgt = typeof l.target === 'object' ? l.target.id : l.target;
      if (src === d.id) neighbours.add(tgt);
      if (tgt === d.id) neighbours.add(src);
    });

    nodeSel.style('opacity', n => neighbours.has(n.id) ? 1 : 0.15);
    linkSel.style('stroke-opacity', l => {
      const src = typeof l.source === 'object' ? l.source.id : l.source;
      const tgt = typeof l.target === 'object' ? l.target.id : l.target;
      return neighbours.has(src) && neighbours.has(tgt) ? 0.8 : 0.05;
    });
  });

  // ── Tag filter buttons ─────────────────────────────────────────────────────
  let activeTag = null;
  const tagContainer = document.getElementById('tag-filters');

  allTags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = tag;
    btn.style.borderColor = color(tag);
    btn.addEventListener('click', () => {
      if (activeTag === tag) {
        activeTag = null;
        btn.classList.remove('active');
        btn.style.background = 'transparent';
        btn.style.color = '#ccc';
        applyFilters();
      } else {
        if (activeTag) {
          tagContainer.querySelector('.tag-btn.active')?.classList.remove('active');
          const prev = tagContainer.querySelector('.tag-btn.active');
          if (prev) { prev.style.background = 'transparent'; prev.style.color = '#ccc'; }
        }
        activeTag = tag;
        btn.classList.add('active');
        btn.style.background = color(tag);
        btn.style.color = '#1a1a2e';
        applyFilters();
      }
    });
    tagContainer.appendChild(btn);
  });

  // ── Search ─────────────────────────────────────────────────────────────────
  let searchQuery = '';
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.trim().toLowerCase();
    applyFilters();
  });

  // ── Combined filter application ────────────────────────────────────────────
  function applyFilters() {
    activeNode = null;

    nodeSel.style('opacity', d => {
      const tagMatch  = !activeTag  || d.tags.includes(activeTag);
      const textMatch = !searchQuery || d.title.toLowerCase().includes(searchQuery);
      return tagMatch && textMatch ? 1 : 0.1;
    });

    linkSel.style('stroke-opacity', l => {
      const src = typeof l.source === 'object' ? l.source : nodes.find(n => n.id === l.source);
      const tgt = typeof l.target === 'object' ? l.target : nodes.find(n => n.id === l.target);
      const srcTagMatch  = !activeTag  || src.tags.includes(activeTag);
      const tgtTagMatch  = !activeTag  || tgt.tags.includes(activeTag);
      const srcTextMatch = !searchQuery || src.title.toLowerCase().includes(searchQuery);
      const tgtTextMatch = !searchQuery || tgt.title.toLowerCase().includes(searchQuery);
      return (srcTagMatch && srcTextMatch) && (tgtTagMatch && tgtTextMatch) ? 0.6 : 0.05;
    });
  }

  function resetHighlight() {
    activeNode = null;
    nodeSel.style('opacity', 1);
    linkSel.style('stroke-opacity', 0.6);
    // reapply active filters if any
    if (activeTag || searchQuery) applyFilters();
  }

  // ── Resize ─────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    const { w: nw, h: nh } = getSize();
    simulation.force('center', d3.forceCenter(nw / 2, nh / 2));
    simulation.alpha(0.1).restart();
  });
})();
</script>
</body>
</html>
